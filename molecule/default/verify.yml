---
- name: Verify
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for plex service to become active (up to 180s)
      ansible.builtin.systemd:
        name: plex.service
      register: plex_service
      until: plex_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert plex service is active
      ansible.builtin.assert:
        that: plex_service.status.ActiveState == 'active'
        fail_msg: "plex.service not active ({{ plex_service.status.ActiveState }})"
        success_msg: "plex.service is active"

    - name: Wait for Plex HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:32400/"
        method: GET
        status_code: [200, 401]
        follow_redirects: none
      register: plex_http
      until: plex_http.status in [200, 401]
      retries: 120
      delay: 5

    - name: Assert Plex HTTP endpoint responds
      ansible.builtin.assert:
        that: plex_http.status in [200, 401]
        fail_msg: "Plex did not respond with 200 or 401 ({{ plex_http.status | default('no response') }})"
        success_msg: "Plex responded with {{ plex_http.status }}"

    - name: Show service status summary
      ansible.builtin.debug:
        msg:
          - "plex systemd: {{ plex_service.status.ActiveState }}"
          - "plex HTTP: {{ plex_http.status }}"
