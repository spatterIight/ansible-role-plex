---
- name: Verify Plex systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Plex service to become active (up to 180s)
      ansible.builtin.systemd:
        name: plex.service
      register: plex_service
      until: plex_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Plex service is active
      ansible.builtin.assert:
        that: plex_service.status.ActiveState == 'active'
        fail_msg: "plex.service not active ({{ plex_service.status.ActiveState }})"
        success_msg: "plex.service is active"

    - name: Retrieve Plex service log for debugging
      when: plex_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu plex.service
      changed_when: false

    - name: Wait for Plex HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:32400/"
        method: GET
        status_code: [200, 401]
        follow_redirects: none
      register: plex_endpoint_http
      until: plex_endpoint_http.status in [200, 401]
      retries: 120
      delay: 5

    - name: Assert Plex HTTP endpoint responds
      ansible.builtin.assert:
        that: plex_endpoint_http.status in [200, 401]
        fail_msg: "Plex did not respond with 200 or 401 ({{ plex_endpoint_http.status | default('no response') }})"
        success_msg: "Plex responded with {{ plex_endpoint_http.status }}"

    - name: Show Plex systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Plex systemd: {{ plex_service.status.ActiveState }}"
          - "Plex HTTP: {{ plex_endpoint_http.status }}"
